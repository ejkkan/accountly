services:
  postgres:
    image: postgres:16-alpine
    container_name: accountly-postgres
    environment:
      POSTGRES_USER: accountly
      POSTGRES_PASSWORD: accountly
      POSTGRES_DB: accountly
    # Host port 5433 so we don't clash with a system Postgres on 5432.
    ports:
      - "5433:5432"
    volumes:
      - accountly-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U accountly -d accountly"]
      interval: 2s
      timeout: 3s
      retries: 20

volumes:
  accountly-pgdata:
